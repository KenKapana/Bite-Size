<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Later! extension</title>
    <link
      href="{{url_for('static', filename='styles/style.css')}}"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Later! extension</h1>
    <!-- session status -->
     <div name="session">
      {% if session %}
      <div><pre>{{pretty}}</pre></div>
      {% else %}
      <p><a href="{{url_for('authorize')}}">Login with Google</a></p>
      {% endif %}
     </div>
     
    <!-- event adder element -->
    <form action="/add" method="post">
      <input type="text" name="title" id="title" placeholder="Enter a title" />
      <input
        type="text"
        name="time"
        id="time"
        placeholder="Enter duration of task"
      />
      <input type="submit" value="Submit" />
      <p id="result"></p>
    </form>
    <script>
      document.getElementById("result").innerHTML = "{{result}}";
    </script>
  </body>
</html>
